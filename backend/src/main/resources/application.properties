spring.application.name=reddit-clone

# DataSource Configuration (PostgreSQL overrides, H2 fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:redditdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# H2 Console Configuration (Only active when H2 is used)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Server Config
server.port=8080
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}

# JWT Configuration
jwt.secret=${JWT_SECRET:9a67a86c75947a11d8d9b89cf5d2dfcfd2b8cfd2dfcfd2b8cfd2dfcfd2b8cfd2}
# 24 hours in milliseconds
jwt.expiration=86400000
